<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 原子核心渐变 -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#7b2ff7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff006e;stop-opacity:0.8" />
    </radialGradient>

    <!-- 电子轨道渐变 -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ff006e;stop-opacity:0.9" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 强发光 -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 文字渐变 -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0e8ff;stop-opacity:1" />
    </linearGradient>

    <!-- 原子背景网格 -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(0,212,255,0.12)"/>
      <line x1="20" y1="0" x2="20" y2="40" stroke="rgba(0,212,255,0.06)" stroke-width="0.5"/>
      <line x1="0" y1="20" x2="40" y2="20" stroke="rgba(0,212,255,0.06)" stroke-width="0.5"/>
    </pattern>

    <!-- 六边形分子图案 -->
    <pattern id="hexPattern" x="0" y="0" width="30" height="26" patternUnits="userSpaceOnUse">
      <polygon points="15,2 27,8.5 27,17.5 15,24 3,17.5 3,8.5" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="200" height="200" rx="24" fill="#06060e"/>

  <!-- 网格背景 -->
  <rect width="200" height="200" rx="24" fill="url(#grid)"/>
  <rect width="200" height="200" rx="24" fill="url(#hexPattern)"/>

  <!-- 外发光圆环 -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="url(#orbitGrad)" stroke-width="0.8" opacity="0.2" filter="url(#glow)"/>

  <!-- 主圆环边框 -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#orbitGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- 原子轨道1 - 水平椭圆 -->
  <ellipse cx="100" cy="100" rx="88" ry="22" fill="none" stroke="url(#orbitGrad)" stroke-width="1" opacity="0.5" filter="url(#glow)"/>

  <!-- 原子轨道2 - 倾斜椭圆 -->
  <ellipse cx="100" cy="100" rx="88" ry="22" fill="none" stroke="url(#orbitGrad)" stroke-width="1" opacity="0.5" transform="rotate(60 100 100)" filter="url(#glow)"/>

  <!-- 原子轨道3 - 反向倾斜椭圆 -->
  <ellipse cx="100" cy="100" rx="88" ry="22" fill="none" stroke="url(#orbitGrad)" stroke-width="1" opacity="0.5" transform="rotate(-60 100 100)" filter="url(#glow)"/>

  <!-- 轨道上的电子1 -->
  <circle cx="100" cy="16" r="3" fill="#00d4ff" filter="url(#strongGlow)">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- 轨道上的电子2 -->
  <circle cx="100" cy="16" r="2.5" fill="#7b2ff7" filter="url(#strongGlow)">
    <animateTransform attributeName="transform" type="rotate" from="120 100 100" to="480 100 100" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- 轨道上的电子3 -->
  <circle cx="100" cy="16" r="2" fill="#ff006e" filter="url(#strongGlow)">
    <animateTransform attributeName="transform" type="rotate" from="240 100 100" to="600 100 100" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- 原子核外圈 -->
  <circle cx="100" cy="100" r="66" fill="none" stroke="url(#coreGrad)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>

  <!-- 原子核 -->
  <circle cx="100" cy="100" r="62" fill="url(#coreGrad)" opacity="0.12" filter="url(#glow)"/>

  <!-- 主字母 G -->
  <g transform="translate(32, 122)">
    <!-- G 的外发光 -->
    <text x="0" y="0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="900" fill="url(#coreGrad)" filter="url(#glow)" opacity="0.9">G</text>
    <!-- G 的主体 -->
    <text x="0" y="0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="900" fill="url(#textGrad)">G</text>
  </g>

  <!-- 主字母 B -->
  <g transform="translate(96, 122)">
    <!-- B 的外发光 -->
    <text x="0" y="0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="900" fill="url(#coreGrad)" filter="url(#glow)" opacity="0.9">B</text>
    <!-- B 的主体 -->
    <text x="0" y="0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="900" fill="url(#textGrad)">B</text>
  </g>

  <!-- 质子/中子装饰点 - 围绕字母 -->
  <circle cx="68" cy="48" r="1.5" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="132" cy="48" r="1.5" fill="#ff006e" opacity="0.6" filter="url(#glow)"/>
  <circle cx="68" cy="152" r="1.5" fill="#7b2ff7" opacity="0.6" filter="url(#glow)"/>
  <circle cx="132" cy="152" r="1.5" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>

  <!-- 连接线装饰 -->
  <line x1="68" y1="48" x2="132" y2="48" stroke="rgba(0,212,255,0.2)" stroke-width="0.6" stroke-dasharray="2 3"/>
  <line x1="68" y1="152" x2="132" y2="152" stroke="rgba(255,0,110,0.2)" stroke-width="0.6" stroke-dasharray="2 3"/>

  <!-- 角落科技装饰 -->
  <g opacity="0.6">
    <!-- 左上 -->
    <path d="M 15 30 L 15 15 L 30 15" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="15" cy="15" r="2" fill="#00d4ff" filter="url(#glow)"/>
    <!-- 右上 -->
    <path d="M 170 15 L 185 15 L 185 30" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="185" cy="15" r="2" fill="#00d4ff" filter="url(#glow)"/>
    <!-- 左下 -->
    <path d="M 15 170 L 15 185 L 30 185" fill="none" stroke="#ff006e" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="15" cy="185" r="2" fill="#ff006e" filter="url(#glow)"/>
    <!-- 右下 -->
    <path d="M 170 185 L 185 185 L 185 170" fill="none" stroke="#ff006e" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="185" cy="185" r="2" fill="#ff006e" filter="url(#glow)"/>
  </g>

  <!-- 底部原子符号装饰 -->
  <text x="100" y="178" font-family="'Courier New', monospace" font-size="9" font-weight="600" fill="#7b2ff7" text-anchor="middle" letter-spacing="4" opacity="0.7">ATOM</text>

  <!-- 顶部能量指示 -->
  <g transform="translate(100, 8)">
    <rect x="-8" y="0" width="3" height="6" fill="#00ff88" opacity="0.9" rx="1">
      <animate attributeName="height" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="0;-2;0" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-2" y="0" width="3" height="8" fill="#00d4ff" opacity="0.9" rx="1">
      <animate attributeName="height" values="8;5;8" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="0;1.5;0" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="4" y="0" width="3" height="5" fill="#ff006e" opacity="0.9" rx="1">
      <animate attributeName="height" values="5;9;5" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="0;-1;0" dur="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 微妙的扫描线 -->
  <line x1="0" y1="0" x2="0" y2="200" stroke="rgba(0,212,255,0.02)" stroke-width="200">
    <animate attributeName="x1" values="0;200;0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0;200;0" dur="10s" repeatCount="indefinite"/>
  </line>
</svg>